<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarameL's World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #intro-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        #intro-text.visible {
            opacity: 1;
        }

        #intro-text h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        #enter-btn {
            position: fixed;
            bottom: 10%;
            right: 10%;
            z-index: 10;
            padding: 1.5rem 3rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
            border-radius: 8px;
        }

        #enter-btn.visible {
            opacity: 1;
        }

        #enter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        #enter-btn .line1 {
            display: block;
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }

        #enter-btn .line2 {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- 3D Earth Container -->
    <div id="canvas-container"></div>

    <!-- Intro Text -->
    <div id="intro-text">
        <h1>世界是一本书，我们也是</h1>
    </div>

    <!-- Enter Button -->
    <button id="enter-btn">
        <span class="line1">directly</span>
        <span class="line2">Enter my world</span>
    </button>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/earth.js"></script>
</body>
</html>
