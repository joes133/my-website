<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#f8e5c5"/>
  
  <!-- Cake base -->
  <rect x="50" y="90" width="100" height="60" rx="5" fill="#ff9a8b"/>
  
  <!-- Cake top layer -->
  <rect x="55" y="70" width="90" height="30" rx="5" fill="#ff6b6b"/>
  
  <!-- Frosting -->
  <ellipse cx="100" cy="70" rx="50" ry="10" fill="#fff5f5"/>
  
  <!-- Candle -->
  <rect x="95" y="40" width="10" height="30" fill="#ffd700"/>
  
  <!-- Flame -->
  <ellipse cx="100" cy="35" rx="8" ry="12" fill="#ff6b6b"/>
  <ellipse cx="100" cy="35" rx="5" ry="8" fill="#ffd700"/>
  
  <!-- Decorations -->
  <circle cx="70" cy="105" r="5" fill="#fff"/>
  <circle cx="100" cy="105" r="5" fill="#fff"/>
  <circle cx="130" cy="105" r="5" fill="#fff"/>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">CarameL</text>
</svg>
